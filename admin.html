<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAPZCodes — Admin</title>
<link rel="icon" href="favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
body { cursor: default; min-height: 100vh; }
#cur, #ring { display: none; }

/* ── Gate ── */
#gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: var(--bg); }
.gate-card { background: var(--s1); border: 1px solid var(--bd); border-radius: var(--r); padding: 34px 32px; width: 380px; max-width: 92vw; box-shadow: var(--shadow); }
.gate-title { font-family: var(--fh); font-size: 1.3rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.gate-title span { color: var(--g); }
.gate-sub { font-size: .78rem; color: var(--mu); margin-bottom: 20px; }
.gate-input { width: 100%; padding: 11px 14px; background: var(--bg); border: 1.5px solid var(--bd2); border-radius: 8px; color: var(--text); font-family: var(--fm); font-size: .9rem; outline: none; margin-bottom: 12px; }
.gate-input:focus { border-color: var(--g); box-shadow: 0 0 0 3px rgba(34,160,50,.08); }
.gate-btn { width: 100%; padding: 11px; background: var(--g); border: none; border-radius: 8px; color: #fff; font-family: var(--fh); font-weight: 700; font-size: .95rem; cursor: pointer; transition: background .18s; }
.gate-btn:hover { background: #1a8028; }
.gate-err { font-size: .78rem; color: #c0392b; margin-top: 10px; display: none; }

/* ── App shell ── */
#app { display: none; }
.topbar {
  height: 56px; background: var(--s1); border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
  position: sticky; top: 0; z-index: 50; box-shadow: var(--shadow);
}
.topbar-logo { font-family: var(--fh); font-size: 1.02rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
.topbar-logo img { height: 26px; width: auto; }
.topbar-logo span { color: var(--g); }
.topbar-tag { font-family: var(--fm); font-size: .6rem; color: var(--mu); letter-spacing: .1em; text-transform: uppercase; }
.topbar-right { margin-left: auto; }
.topbar-lockbtn { padding: 5px 14px; border-radius: 6px; font-size: .72rem; font-weight: 600; border: 1px solid rgba(200,50,50,.2); background: var(--bg); color: #c0392b; cursor: pointer; transition: all .18s; }
.topbar-lockbtn:hover { background: rgba(200,50,50,.06); border-color: rgba(200,50,50,.4); }

.layout { display: flex; min-height: calc(100vh - 56px); background: var(--bg); }
.sidebar { width: 220px; flex-shrink: 0; background: var(--s1); border-right: 1px solid var(--bd); padding: 16px 10px; }
.sb-label { font-family: var(--fm); font-size: .55rem; text-transform: uppercase; letter-spacing: .14em; color: var(--mu); padding: 8px 12px 4px; }
.sb-item { display: block; width: 100%; text-align: left; padding: 9px 12px; border-radius: 8px; background: none; border: none; color: var(--mu); font-family: var(--fb); font-size: .82rem; font-weight: 600; cursor: pointer; margin-bottom: 2px; transition: all .15s; }
.sb-item:hover { background: rgba(34,160,50,.06); color: var(--g); }
.sb-item.active { background: rgba(34,160,50,.1); color: var(--g); border-left: 2px solid var(--g); padding-left: 10px; }

.main { flex: 1; padding: 22px 26px; overflow-x: auto; background: var(--bg); }
.main-hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.main-title { font-family: var(--fh); font-size: 1.3rem; font-weight: 700; color: var(--text); }
.main-count { font-family: var(--fm); font-size: .68rem; color: var(--mu); }

.btn { padding: 8px 16px; border-radius: 7px; font-family: var(--fb); font-size: .8rem; font-weight: 700; cursor: pointer; border: none; transition: all .18s; }
.btn-primary { background: var(--g); color: #fff; }
.btn-primary:hover { background: #1a8028; }
.btn-ghost { background: var(--bg); border: 1px solid var(--bd); color: var(--mu); }
.btn-ghost:hover { border-color: var(--g); color: var(--g); }
.btn-row-danger { background: rgba(200,50,50,.06); border: 1px solid rgba(200,50,50,.18); color: #c0392b; padding: 5px 11px; font-size: .7rem; border-radius: 6px; cursor: pointer; transition: all .15s; font-weight: 700; font-family: var(--fb); }
.btn-row-danger:hover { background: rgba(200,50,50,.12); }
.btn-row-save { background: rgba(34,160,50,.08); border: 1px solid rgba(34,160,50,.22); color: var(--g); padding: 5px 11px; font-size: .7rem; border-radius: 6px; cursor: pointer; transition: all .15s; font-weight: 700; font-family: var(--fb); }
.btn-row-save:hover { background: rgba(34,160,50,.16); }

table { border-collapse: collapse; width: 100%; background: var(--s1); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }
th { background: var(--s2); font-family: var(--fm); font-size: .6rem; text-transform: uppercase; letter-spacing: .08em; color: var(--mu); padding: 10px 10px; text-align: left; white-space: nowrap; border-bottom: 1px solid var(--bd); }
td { padding: 6px 8px; border-bottom: 1px solid var(--bd2); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(34,160,50,.03); }
td input, td textarea { width: 100%; min-width: 120px; padding: 6px 8px; background: var(--bg); border: 1px solid var(--bd); border-radius: 6px; color: var(--text); font-family: var(--fb); font-size: .78rem; outline: none; resize: vertical; transition: border-color .15s; }
td input:focus, td textarea:focus { border-color: var(--g); box-shadow: 0 0 0 2px rgba(34,160,50,.08); }
tr.new-row td { background: rgba(34,160,50,.03); }
tr.dirty td input, tr.dirty td textarea { border-color: #d97706; }
.row-actions { display: flex; gap: 6px; white-space: nowrap; }

.loading-state, .empty-state { padding: 40px; text-align: center; color: var(--mu); font-family: var(--fm); font-size: .8rem; }
.spinner { width: 28px; height: 28px; border: 2.5px solid var(--bd); border-top-color: var(--g); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; border-radius: 8px; font-size: .82rem; font-weight: 600; z-index: 200; display: none; box-shadow: var(--shadow); }
.toast.ok  { background: rgba(34,160,50,.1); border: 1px solid rgba(34,160,50,.28); color: #16a34a; }
.toast.err { background: rgba(200,50,50,.08); border: 1px solid rgba(200,50,50,.22); color: #c0392b; }
</style>
</head>
<body>
<div id="cur"></div>

<div id="gate">
  <div class="gate-card">
    <div class="gate-title">SAPZ<span>CODES</span> Admin</div>
    <div class="gate-sub">Enter the admin password to manage all sheet tabs.</div>
    <input class="gate-input" type="password" id="gate-pw" placeholder="Admin password" autocomplete="off"/>
    <button class="gate-btn" onclick="doGateLogin()">Unlock →</button>
    <div class="gate-err" id="gate-err">Incorrect password.</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <span class="topbar-logo">
      <img src="logo.png" alt="SAPZCODES" onerror="this.style.display='none'"/>
      SAPZ<span>CODES</span>
    </span>
    <span class="topbar-tag">Admin Panel</span>
    <div class="topbar-right">
      <button class="topbar-lockbtn" onclick="lockOut()">🔒 Lock</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="sb-label">Sheet Tabs</div>
    </div>
    <div class="main" id="main">
      <div class="loading-state"><div class="spinner"></div>Select a tab from the left.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx4H_6v2nNH_Xa0FajhKQKCZgHgwuupi2CD6NdC4YuatcE0f451IFgXbNES-7sYRF4Hog/exec';

let ADMIN_PW = '', TABS = [], currentTab = null;
let currentHeaders = [], currentRows = [], newRowValues = null;

function toast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (ok?'ok':'err');
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2600);
}

async function doGateLogin() {
  const pw = document.getElementById('gate-pw').value;
  if (!pw) return;
  try {
    const res  = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'adminAuth',password:pw}), redirect:'follow' });
    const data = await res.json();
    if (data.status==='ok') {
      ADMIN_PW = pw; TABS = data.tabs;
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display  = 'block';
      buildSidebar();
    } else {
      const el = document.getElementById('gate-err');
      el.textContent = data.message||'Incorrect password.'; el.style.display = 'block';
    }
  } catch(e) {
    const el = document.getElementById('gate-err'); el.textContent = 'Connection error.'; el.style.display = 'block';
  }
}
document.getElementById('gate-pw').addEventListener('keydown', e => { if (e.key==='Enter') doGateLogin(); });

function lockOut() {
  ADMIN_PW=''; TABS=[]; currentTab=null;
  document.getElementById('app').style.display  = 'none';
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('gate-pw').value = '';
  document.getElementById('gate-err').style.display = 'none';
}

function cssId(s) { return s.replace(/[^a-zA-Z0-9]/g,''); }

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sb-label">Sheet Tabs</div>' +
    TABS.map(t => `<button class="sb-item" id="sb-${cssId(t)}" onclick="openTab('${t}')">${t}</button>`).join('');
}

async function openTab(tab) {
  currentTab = tab; newRowValues = null;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const btn = document.getElementById('sb-'+cssId(tab));
  if (btn) btn.classList.add('active');
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loading-state"><div class="spinner"></div>Loading ${tab}…</div>`;
  try {
    const res  = await fetch(`${GAS_URL}?action=adminGetData&tab=${encodeURIComponent(tab)}&password=${encodeURIComponent(ADMIN_PW)}`);
    const data = await res.json();
    if (data.status!=='ok') throw new Error(data.message||'Failed to load');
    currentHeaders = data.data.headers;
    currentRows    = data.data.rows.map(r => ({ rowIndex:r.rowIndex, values:r.values.slice(), dirty:false }));
    renderTable();
  } catch(err) { main.innerHTML = `<div class="empty-state">⚠️ ${esc(err.message)}</div>`; }
}

function esc(s) { return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderTable() {
  const main    = document.getElementById('main');
  const headers = currentHeaders.length ? currentHeaders : ['Col A'];
  let html = `
    <div class="main-hdr">
      <span class="main-title">${currentTab}</span>
      <span class="main-count">${currentRows.length} rows</span>
      <button class="btn btn-primary" onclick="startNewRow()">+ Add Row</button>
      <button class="btn btn-ghost"   onclick="openTab(currentTab)">↺ Refresh</button>
    </div>
    <table>
      <thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}<th>Actions</th></tr></thead>
      <tbody>`;

  if (newRowValues) {
    html += `<tr class="new-row">${headers.map((_,ci)=>`<td>${cellInput('new',ci,newRowValues[ci]||'')}</td>`).join('')}<td class="row-actions"><button class="btn-row-save" onclick="saveNewRow()">💾 Save</button><button class="btn-row-danger" onclick="cancelNewRow()">✕</button></td></tr>`;
  }
  currentRows.forEach((row,ri) => {
    html += `<tr class="${row.dirty?'dirty':''}" id="row-${ri}">${headers.map((_,ci)=>`<td>${cellInput(ri,ci,row.values[ci])}</td>`).join('')}<td class="row-actions"><button class="btn-row-save" onclick="saveRow(${ri})">💾 Save</button><button class="btn-row-danger" onclick="deleteRow(${ri})">🗑</button></td></tr>`;
  });
  html += `</tbody></table>`;
  if (currentRows.length===0 && !newRowValues)
    html += `<div class="empty-state">No rows yet — click "+ Add Row" to create one.</div>`;
  main.innerHTML = html;
}

function cellInput(ri, ci, val) {
  const long   = String(val||'').length > 60;
  const idAttr = `data-ri="${ri}" data-ci="${ci}"`;
  if (long) return `<textarea rows="2" ${idAttr} onchange="onCellChange(this)">${esc(val)}</textarea>`;
  return `<input type="text" value="${esc(val)}" ${idAttr} onchange="onCellChange(this)"/>`;
}

function onCellChange(el) {
  const ri = el.getAttribute('data-ri');
  const ci = parseInt(el.getAttribute('data-ci'), 10);
  if (ri==='new') { if (!newRowValues) newRowValues=[]; newRowValues[ci]=el.value; }
  else { const row=currentRows[parseInt(ri,10)]; row.values[ci]=el.value; row.dirty=true; document.getElementById('row-'+ri).classList.add('dirty'); }
}

function startNewRow()  { newRowValues = currentHeaders.map(()=>''); renderTable(); }
function cancelNewRow() { newRowValues = null; renderTable(); }

async function saveNewRow() {
  if (!newRowValues) return;
  try {
    const res  = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action:'adminSaveRow',password:ADMIN_PW,tab:currentTab,values:newRowValues}), redirect:'follow' });
    const data = await res.json();
    if (data.status==='ok') { toast('Row added ✓', true); newRowValues=null; openTab(currentTab); }
    else toast(data.message||'Failed', false);
  } catch { toast('Connection error', false); }
}

async function saveRow(ri) {
  const row = currentRows[ri];
  try {
    const res  = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action:'adminSaveRow',password:ADMIN_PW,tab:currentTab,rowIndex:row.rowIndex,values:row.values}), redirect:'follow' });
    const data = await res.json();
    if (data.status==='ok') { toast('Saved ✓', true); row.dirty=false; renderTable(); }
    else toast(data.message||'Failed', false);
  } catch { toast('Connection error', false); }
}

async function deleteRow(ri) {
  const row = currentRows[ri];
  if (!confirm('Delete this row? This cannot be undone.')) return;
  try {
    const res  = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify({action:'adminDeleteRow',password:ADMIN_PW,tab:currentTab,rowIndex:row.rowIndex}), redirect:'follow' });
    const data = await res.json();
    if (data.status==='ok') { toast('Deleted ✓', true); openTab(currentTab); }
    else toast(data.message||'Failed', false);
  } catch { toast('Connection error', false); }
}
</script>
</body>
</html>
