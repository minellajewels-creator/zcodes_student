<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SAPZCodes 3D Endless Runner</title>
  <style>
    :root { --g: #22a032; --fm: 'JetBrains Mono', monospace; --fh: 'Rajdhani', sans-serif; }
    body { margin: 0; overflow: hidden; background: #0d1117; color: white; font-family: var(--fm); }

    /* ── Auth Screen ─────────────────────────────────────────── */
    #auth-screen {
      position: fixed; inset: 0; background: #0d1117;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; z-index: 999;
    }
    #auth-screen.hidden { display: none; }
    .auth-lock-icon  { font-size: 3rem; }
    .auth-lock-title { font-size: 1.5rem; font-weight: 700; color: #c0392b; text-align: center; }
    .auth-lock-sub   { font-size: .82rem; color: rgba(240,244,240,.4); text-align: center; max-width: 340px; }
    .auth-lock-btn   { padding: 10px 26px; border: none; border-radius: 8px; background: var(--g); color: #fff; font-size: .95rem; font-weight: 700; cursor: pointer; margin-top: 8px; transition: all .18s; }
    .auth-lock-btn:hover { background: #1a8028; transform: translateY(-1px); }

    /* ── Loading Screen ──────────────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0; background: #0d1117;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; z-index: 90;
    }
    #loading-screen.hidden { display: none; }
    .ld-title  { font-size: 1.6rem; font-weight: 700; color: #f0f4f0; margin-bottom: 4px; }
    .ld-title span { color: var(--g); }
    .ld-bar-wrap { width: 300px; max-width: 88vw; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 20px; height: 5px; overflow: hidden; }
    .ld-bar-fill { height: 100%; background: linear-gradient(90deg, var(--g), #58a6ff); border-radius: 20px; width: 0%; transition: width .4s ease; }
    .ld-status  { font-size: .65rem; color: rgba(240,244,240,.3); letter-spacing: .05em; min-height: 16px; }
    .ld-err     { margin-top: 16px; padding: 10px 18px; background: rgba(192,57,43,.1); border: 1px solid rgba(192,57,43,.25); border-radius: 8px; color: #c0392b; font-size: .8rem; text-align: center; display: none; max-width: 380px; line-height: 1.5; }
    .ld-err.show { display: block; }
    .ld-retry   { margin-top: 10px; padding: 8px 22px; border-radius: 7px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); color: rgba(240,244,240,.6); font-size: .8rem; font-weight: 600; cursor: pointer; display: none; transition: all .18s; }
    .ld-retry.show { display: inline-block; }
    .ld-retry:hover { border-color: var(--g); color: var(--g); }

    /* ── UI Overlays ─────────────────────────────────────────── */
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    #score-board {
      position: absolute; top: 20px; right: 30px;
      font-size: 1.5rem; font-weight: bold; color: var(--g);
      text-shadow: 1px 1px 4px #000;
    }

    #current-question {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      text-align: center; background: rgba(13,17,23,.88); padding: 15px 30px;
      border: 1px solid var(--g); border-radius: 8px; font-size: 1.1rem;
      max-width: 62%; display: none; line-height: 1.55;
      box-shadow: 0 4px 24px rgba(34,160,50,.15);
    }
    #current-question .q-label {
      font-size: .6rem; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(240,244,240,.3); margin-bottom: 6px;
    }

    /* ── Lane Answer Labels ──────────────────────────────────── */
    .obstacle-text {
      position: absolute; transform: translate(-50%,-50%);
      background: rgba(0,0,0,.78); padding: 8px 14px; border-radius: 6px;
      font-weight: bold; font-size: .8rem; text-align: center;
      border: 1px solid #555; pointer-events: none; display: none;
      max-width: 160px; line-height: 1.35;
    }
    .lane-0 { border-color: #2563eb; color: #93c5fd; }
    .lane-1 { border-color: #d97706; color: #fcd34d; }
    .lane-2 { border-color: #c0392b; color: #fca5a5; }

    /* ── Feedback Flash ──────────────────────────────────────── */
    #feedback-flash {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 2rem; font-weight: 900; letter-spacing: .04em;
      padding: 12px 28px; border-radius: 10px; pointer-events: none;
      display: none; z-index: 50;
    }
    #feedback-flash.correct { background: rgba(34,160,50,.15); color: var(--g); border: 2px solid rgba(34,160,50,.4); }
    #feedback-flash.wrong   { background: rgba(192,57,43,.13); color: #ef4444; border: 2px solid rgba(192,57,43,.35); }

    /* ── HUD Lives ───────────────────────────────────────────── */
    #lives-bar {
      position: absolute; top: 20px; left: 30px; font-size: 1.4rem;
      display: none; gap: 4px;
    }
    .heart.lost { opacity: .2; filter: grayscale(1); }

    /* ── Game Over Screen ────────────────────────────────────── */
    #game-over-screen {
      position: absolute; inset: 0; background: rgba(0,0,0,.88);
      display: none; flex-direction: column; align-items: center;
      justify-content: center; pointer-events: auto; gap: 10px;
    }
    #game-over-screen h1 { color: #c0392b; font-size: 4rem; margin: 0; }
    #final-score  { font-size: 2rem; color: var(--g); }
    #final-detail { font-size: .85rem; color: rgba(240,244,240,.4); margin-bottom: 14px; }
    .btn { padding: 12px 30px; background: var(--g); border: none; border-radius: 8px; color: white; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: all .18s; margin: 4px; }
    .btn:hover { background: #1a8028; transform: translateY(-2px); }
    .btn-sec { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); color: rgba(240,244,240,.6); }
    .btn-sec:hover { border-color: var(--g); color: var(--g); background: rgba(34,160,50,.08); }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

<!-- ── Auth Screen ─────────────────────────────────────────── -->
<div id="auth-screen" class="hidden">
  <div class="auth-lock-icon">🔒</div>
  <div class="auth-lock-title">Access Required</div>
  <div class="auth-lock-sub">You need to be logged in to play the Runner. Please enter the platform first.</div>
  <button class="auth-lock-btn" onclick="window.location.href='index.html'">→ Login / Get Access</button>
</div>

<!-- ── Loading Screen ─────────────────────────────────────── -->
<div id="loading-screen">
  <div class="ld-title">Loading <span>3D Runner</span></div>
  <div class="ld-bar-wrap"><div class="ld-bar-fill" id="ld-bar"></div></div>
  <div class="ld-status" id="ld-status">Connecting to question bank…</div>
  <div class="ld-err"  id="ld-err"></div>
  <button class="ld-retry" id="ld-retry" onclick="fetchQuestions()">↩ Retry</button>
</div>

<!-- ── Game UI (shown after load) ────────────────────────── -->
<div id="game-ui" style="display:none; position:fixed; inset:0; pointer-events:none;">
  <div id="ui-layer">
    <div id="score-board">Score: <span id="score">0</span></div>
    <div id="lives-bar" style="display:flex;">
      <span class="heart" id="h1">❤️</span>
      <span class="heart" id="h2">❤️</span>
      <span class="heart" id="h3">❤️</span>
    </div>
    <div id="current-question">
      <div class="q-label">Question</div>
      <span id="q-text">Loading…</span>
    </div>
    <div id="obs-0" class="obstacle-text lane-0">Option A</div>
    <div id="obs-1" class="obstacle-text lane-1">Option B</div>
    <div id="obs-2" class="obstacle-text lane-2">Option C</div>
    <div id="feedback-flash"></div>
  </div>
  <div id="game-over-screen">
    <h1>GAME OVER</h1>
    <div id="final-score">Score: 0</div>
    <div id="final-detail">0 correct answers</div>
    <div>
      <button class="btn" onclick="location.reload()">↩ Play Again</button>
      <button class="btn btn-sec" onclick="window.location.href='games.html'">← Games Hub</button>
    </div>
  </div>
</div>

<!-- ─────────────────────────────────────────────────────────────
     SECURITY BLOCK — runs synchronously before module load
───────────────────────────────────────────────────────────────── -->
<script>
(function() {
  // Anti-devtools
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' ||
       (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key)) ||
       (e.ctrlKey && e.key === 'U') ||
       (e.ctrlKey && ['s','S','a','A'].includes(e.key))) { e.preventDefault(); }
  });
  setInterval(() => {
    if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d1117;color:#c0392b;font-family:monospace;font-size:1.1rem;text-align:center;padding:20px;">⛔ DevTools detected. Close DevTools to continue.</div>';
    }
  }, 1200);

  // Domain lock
  const ALLOWED = ['students.sapzcodes.com', 'localhost', '127.0.0.1'];
  const host = window.location.hostname;
  if (!ALLOWED.some(d => host === d || host.endsWith('.' + d))) {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d1117;color:#c0392b;font-family:monospace;font-size:1.1rem;text-align:center;padding:20px;">⛔ This content is only available on the official SAPZCodes platform.</div>';
    throw new Error('Domain lock');
  }

  // Auth guard — same tokens as abap-runner.html
  if (!sessionStorage.getItem('szc_token') && !localStorage.getItem('szc_token')) {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('auth-screen').classList.remove('hidden');
    throw new Error('Not authenticated');
  }
})();
</script>

<!-- ─────────────────────────────────────────────────────────────
     MAIN GAME MODULE
───────────────────────────────────────────────────────────────── -->
<script type="module">
  import * as THREE from 'three';

  // ── CONFIG ────────────────────────────────────────────────────
  const GAS_URL    = 'https://script.google.com/macros/s/AKfycbwy_yWVkYL6qN_QAokIUMNClWqI96wdiF3qasWVLihOMi9ecH12BSzG6ypSZI1A54VA/exec';
  const API_SECRET = 'SZC-INTERNAL-2025-XK9';

  // ── LOADING HELPERS ───────────────────────────────────────────
  function setBar(pct, msg) {
    document.getElementById('ld-bar').style.width = pct + '%';
    document.getElementById('ld-status').textContent = msg;
  }
  function showLoadErr(msg) {
    const el = document.getElementById('ld-err');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('ld-retry').classList.add('show');
  }
  function hideLoadErr() {
    document.getElementById('ld-err').classList.remove('show');
    document.getElementById('ld-retry').classList.remove('show');
  }

  // ── FETCH QUESTIONS FROM SUBWAY TAB ───────────────────────────
  let quizData = [];

  window.fetchQuestions = async function fetchQuestions() {
    hideLoadErr(); setBar(10, 'Connecting…');
    try {
      setBar(35, 'Fetching subway questions…');
      const url = `${GAS_URL}?action=getSubwayData&key=${encodeURIComponent(API_SECRET)}`;
      const res  = await fetch(url, { redirect: 'follow' });
      setBar(65, 'Parsing…');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();

      if (json.status !== 'ok' || !json.data || json.data.length === 0)
        throw new Error('No subway questions found. Check the "subway" tab in your sheet.');

      quizData = json.data; // array of { question, correct, wrong1, wrong2 }
      setBar(100, '✓ Loaded ' + quizData.length + ' questions!');
      await new Promise(r => setTimeout(r, 500));

      // Show game
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('game-ui').style.display = 'block';
      initGame();
    } catch (err) {
      setBar(30, '');
      showLoadErr('Could not load questions: ' + err.message);
    }
  };

  // ─────────────────────────────────────────────────────────────
  // SCENE SETUP
  // ─────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0d1117, 0.028);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, -10);
  camera.lookAt(0, 2, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0d1117);
  document.body.appendChild(renderer.domElement);
  renderer.domElement.style.cssText = 'position:fixed;inset:0;z-index:1;';

  // Bring UI above canvas
  document.getElementById('game-ui').style.zIndex = '10';

  // Lighting
  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
  hemiLight.position.set(0, 20, 0);
  scene.add(hemiLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(-3, 10, -10);
  scene.add(dirLight);

  // ─── Track ────────────────────────────────────────────────────
  const trackGeo  = new THREE.PlaneGeometry(10, 500);
  const trackMat  = new THREE.MeshLambertMaterial({ color: 0x161b22 });
  const trackMesh = new THREE.Mesh(trackGeo, trackMat);
  trackMesh.rotation.x = -Math.PI / 2;
  trackMesh.position.z = 200;
  scene.add(trackMesh);

  // Lane dividers
  [-1.2, 1.2].forEach(x => {
    const divGeo = new THREE.PlaneGeometry(0.06, 500);
    const divMat = new THREE.MeshBasicMaterial({ color: 0x22a032, opacity: 0.35, transparent: true });
    const div    = new THREE.Mesh(divGeo, divMat);
    div.rotation.x = -Math.PI / 2;
    div.position.set(x, 0.01, 200);
    scene.add(div);
  });

  // Grid floor (side areas)
  const grid = new THREE.GridHelper(100, 50, 0x22a032, 0x1a2a1e);
  grid.position.y = 0;
  scene.add(grid);

  // Side walls (glowing borders)
  [-5.5, 5.5].forEach(x => {
    const wGeo = new THREE.PlaneGeometry(0.15, 500);
    const wMat = new THREE.MeshBasicMaterial({ color: 0x22a032, opacity: 0.5, transparent: true });
    const wall = new THREE.Mesh(wGeo, wMat);
    wall.position.set(x, 1, 200);
    scene.add(wall);
  });

  // ─────────────────────────────────────────────────────────────
  // SIMPLE RUNNER CHARACTER (box-man, no FBX needed)
  // ─────────────────────────────────────────────────────────────
  const charGroup = new THREE.Group();
  // Body
  const bodyGeo  = new THREE.BoxGeometry(0.6, 0.8, 0.35);
  const bodyMat  = new THREE.MeshLambertMaterial({ color: 0x22a032 });
  const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
  bodyMesh.position.y = 0.9;
  charGroup.add(bodyMesh);
  // Head
  const headGeo  = new THREE.BoxGeometry(0.45, 0.45, 0.45);
  const headMat  = new THREE.MeshLambertMaterial({ color: 0xf0c080 });
  const headMesh = new THREE.Mesh(headGeo, headMat);
  headMesh.position.y = 1.65;
  charGroup.add(headMesh);
  // Legs
  [-0.17, 0.17].forEach((x, i) => {
    const legGeo = new THREE.BoxGeometry(0.22, 0.5, 0.22);
    const legMat = new THREE.MeshLambertMaterial({ color: 0x1a4a2a });
    const leg    = new THREE.Mesh(legGeo, legMat);
    leg.position.set(x, 0.25, 0);
    leg.name = 'leg' + i;
    charGroup.add(leg);
  });

  scene.add(charGroup);

  // ─────────────────────────────────────────────────────────────
  // GAME STATE
  // ─────────────────────────────────────────────────────────────
  const lanes       = [-2.5, 0, 2.5];
  const GAME_CONFIG = { LIVES: 3, GAME_SPEED: 15 };

  let state = {
    currentLane : 1,
    targetX     : 0,
    score       : 0,
    lives       : GAME_CONFIG.LIVES,
    correct     : 0,
    isGameOver  : false,
    isRunning   : false,
    qIndex      : 0,
  };

  let activeQuestion = null;
  let obstacleMeshes = [];
  let obstacleData   = [];
  let questionPending = false;
  let legPhase        = 0;
  let gameSpeed       = GAME_CONFIG.GAME_SPEED;

  const clock = new THREE.Clock();
  const vec3  = new THREE.Vector3();

  // ── Obstacle pool: Z spawning positions ──────────────────────
  const SPAWN_Z = 45;

  // ─────────────────────────────────────────────────────────────
  // INIT GAME
  // ─────────────────────────────────────────────────────────────
  function initGame() {
    state = {
      currentLane : 1, targetX : 0, score : 0,
      lives       : GAME_CONFIG.LIVES, correct : 0,
      isGameOver  : false, isRunning : true, qIndex : 0,
    };
    updateHUD();
    updateLives();
    document.getElementById('game-over-screen').style.display = 'none';
    spawnNextQuestion();
    animate();
  }

  // ─────────────────────────────────────────────────────────────
  // CONTROLS
  // ─────────────────────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    if (state.isGameOver) return;
    if (e.key === 'ArrowLeft'  && state.currentLane > 0) { state.currentLane--; state.targetX = lanes[state.currentLane]; }
    if (e.key === 'ArrowRight' && state.currentLane < 2) { state.currentLane++; state.targetX = lanes[state.currentLane]; }
  });

  let touchStartX = 0;
  window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
  window.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (dx < -30 && state.currentLane > 0) { state.currentLane--; state.targetX = lanes[state.currentLane]; }
    if (dx >  30 && state.currentLane < 2) { state.currentLane++; state.targetX = lanes[state.currentLane]; }
  });

  // ─────────────────────────────────────────────────────────────
  // QUIZ LOGIC
  // ─────────────────────────────────────────────────────────────
  function spawnNextQuestion() {
    if (quizData.length === 0) return;
    if (state.qIndex >= quizData.length) { state.qIndex = 0; } // loop questions

    activeQuestion = quizData[state.qIndex];
    state.qIndex++;

    document.getElementById('q-text').textContent = activeQuestion.question;
    document.getElementById('current-question').style.display = 'block';

    const answers = [
      { text: activeQuestion.correct, isCorrect: true  },
      { text: activeQuestion.wrong1,  isCorrect: false },
      { text: activeQuestion.wrong2,  isCorrect: false },
    ];
    answers.sort(() => Math.random() - 0.5);

    // Clear old obstacles
    obstacleMeshes.forEach(m => scene.remove(m));
    obstacleMeshes = [];
    obstacleData   = [];

    const LANE_COLORS = [0x2563eb, 0xd97706, 0xc0392b];

    for (let i = 0; i < 3; i++) {
      // Pillar body
      const geo  = new THREE.BoxGeometry(1.8, 2.2, 0.5);
      const mat  = new THREE.MeshLambertMaterial({
        color       : LANE_COLORS[i],
        transparent : true,
        opacity     : 0.55,
      });
      const box = new THREE.Mesh(geo, mat);
      box.position.set(lanes[i], 1.1, SPAWN_Z);
      scene.add(box);

      // Glow edge outline
      const edges    = new THREE.EdgesGeometry(geo);
      const lineMat  = new THREE.LineBasicMaterial({ color: LANE_COLORS[i], opacity: 0.9, transparent: true });
      const outline  = new THREE.LineSegments(edges, lineMat);
      box.add(outline);

      obstacleMeshes.push(box);

      const uiElem = document.getElementById(`obs-${i}`);
      uiElem.textContent = answers[i].text;
      uiElem.style.display = 'block';

      obstacleData.push({
        mesh      : box,
        isCorrect : answers[i].isCorrect,
        uiElement : uiElem,
      });
    }
    questionPending = false;
  }

  // ── Collision & Answer Handling ───────────────────────────────
  function updateObstacles(delta) {
    if (!activeQuestion || state.isGameOver || questionPending) return;

    for (let i = 0; i < obstacleData.length; i++) {
      const obs = obstacleData[i];
      obs.mesh.position.z -= gameSpeed * delta;

      // Project 3D → 2D screen for HTML labels
      vec3.copy(obs.mesh.position);
      vec3.project(camera);
      const sx = (vec3.x * 0.5 + 0.5) * window.innerWidth;
      const sy = (vec3.y * -0.5 + 0.5) * window.innerHeight;

      // Hide label when obstacle is behind camera or very far
      if (vec3.z < 1) {
        obs.uiElement.style.left = sx + 'px';
        obs.uiElement.style.top  = (sy - 55) + 'px';
      }

      // Collision zone: character is at Z ≈ 0
      if (obs.mesh.position.z < 0.8 && obs.mesh.position.z > -1.2) {
        if (Math.abs(lanes[state.currentLane] - obs.mesh.position.x) < 0.5) {
          questionPending = true;
          obstacleData.forEach(o => { o.uiElement.style.display = 'none'; });
          handleCollision(obs.isCorrect);
          break;
        }
      }

      // Obstacle passed without collision → wrong (missed question)
      if (obs.mesh.position.z < -4 && !questionPending) {
        questionPending = true;
        obstacleData.forEach(o => { o.uiElement.style.display = 'none'; });
        handleCollision(false); // missed = wrong
        break;
      }
    }
  }

  function handleCollision(isCorrect) {
    document.getElementById('current-question').style.display = 'none';
    const flash = document.getElementById('feedback-flash');

    if (isCorrect) {
      state.score   += 100;
      state.correct += 1;
      flash.textContent = '✓ CORRECT! +100';
      flash.className = 'correct';
      flash.style.display = 'block';
      gameSpeed = Math.min(30, gameSpeed + 0.5); // speed up slightly
    } else {
      state.lives--;
      updateLives();
      flash.textContent = '✗ WRONG! −1 Life';
      flash.className = 'wrong';
      flash.style.display = 'block';
      if (state.lives <= 0) {
        setTimeout(() => triggerGameOver(), 900);
        return;
      }
    }

    updateHUD();
    setTimeout(() => { flash.style.display = 'none'; }, 1100);

    // Clear current obstacles then spawn next question
    obstacleMeshes.forEach(m => scene.remove(m));
    obstacleMeshes = [];
    obstacleData   = [];
    setTimeout(() => spawnNextQuestion(), 1200);
  }

  function triggerGameOver() {
    state.isGameOver = true;
    document.getElementById('current-question').style.display = 'none';
    document.getElementById('feedback-flash').style.display   = 'none';
    obstacleData.forEach(o => { o.uiElement.style.display = 'none'; });
    document.getElementById('final-score').textContent  = 'Score: ' + state.score;
    document.getElementById('final-detail').textContent = state.correct + ' correct answers';
    document.getElementById('game-over-screen').style.display = 'flex';
  }

  // ─────────────────────────────────────────────────────────────
  // HUD HELPERS
  // ─────────────────────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('score').textContent = state.score;
  }
  function updateLives() {
    ['h1','h2','h3'].forEach((id, i) => {
      const el = document.getElementById(id);
      if (el) el.className = 'heart' + (i >= state.lives ? ' lost' : '');
    });
  }

  // ─────────────────────────────────────────────────────────────
  // SCROLLING FLOOR TILES (simulate movement)
  // ─────────────────────────────────────────────────────────────
  const floorTiles = [];
  const TILE_COUNT = 20;
  const TILE_SPAN  = 8;
  for (let i = 0; i < TILE_COUNT; i++) {
    const geo = new THREE.PlaneGeometry(9.5, TILE_SPAN, 1, 1);
    const mat = new THREE.MeshBasicMaterial({ color: 0x0d1117 });
    const tile = new THREE.Mesh(geo, mat);
    tile.rotation.x = -Math.PI / 2;
    tile.position.set(0, 0.005, i * TILE_SPAN);
    scene.add(tile);
    floorTiles.push(tile);
  }
  const TOTAL_FLOOR = TILE_COUNT * TILE_SPAN;

  // ─────────────────────────────────────────────────────────────
  // PARTICLES (correct answer burst)
  // ─────────────────────────────────────────────────────────────
  const particleMeshes = [];
  function spawnParticles(color) {
    for (let i = 0; i < 12; i++) {
      const geo = new THREE.SphereGeometry(0.08, 4, 4);
      const mat = new THREE.MeshBasicMaterial({ color });
      const p   = new THREE.Mesh(geo, mat);
      p.position.copy(charGroup.position);
      p.position.y += 1;
      p._vel = new THREE.Vector3(
        (Math.random() - 0.5) * 4,
        2 + Math.random() * 3,
        (Math.random() - 0.5) * 2
      );
      p._life = 1.0;
      scene.add(p);
      particleMeshes.push(p);
    }
  }
  function updateParticles(dt) {
    for (let i = particleMeshes.length - 1; i >= 0; i--) {
      const p = particleMeshes[i];
      p._vel.y -= 6 * dt;
      p.position.addScaledVector(p._vel, dt);
      p._life -= dt * 1.5;
      p.material.opacity = Math.max(0, p._life);
      p.material.transparent = true;
      if (p._life <= 0) { scene.remove(p); particleMeshes.splice(i, 1); }
    }
  }

  // ─────────────────────────────────────────────────────────────
  // ANIMATE LOOP
  // ─────────────────────────────────────────────────────────────
  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);

    if (!state.isGameOver && state.isRunning) {
      // Smooth lane switch
      charGroup.position.x = THREE.MathUtils.lerp(charGroup.position.x, state.targetX, 10 * delta);

      // Leg animation (running)
      legPhase += delta * 8;
      charGroup.children.forEach(child => {
        if (child.name === 'leg0') child.rotation.x =  Math.sin(legPhase) * 0.5;
        if (child.name === 'leg1') child.rotation.x = -Math.sin(legPhase) * 0.5;
      });

      // Scroll floor tiles forward
      floorTiles.forEach(tile => {
        tile.position.z -= gameSpeed * delta;
        if (tile.position.z < -TILE_SPAN * 2) {
          tile.position.z += TOTAL_FLOOR;
        }
      });

      // Scroll grid
      grid.position.z -= gameSpeed * delta;
      if (grid.position.z < -10) grid.position.z = 0;

      updateObstacles(delta);
      updateParticles(delta);
    }

    renderer.render(scene, camera);
  }

  // ─────────────────────────────────────────────────────────────
  // WINDOW RESIZE
  // ─────────────────────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ─────────────────────────────────────────────────────────────
  // KICK OFF
  // ─────────────────────────────────────────────────────────────
  fetchQuestions();
</script>
</body>
</html>
