<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAPZCodes — Initializing</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --border: #e2e6ec;
  --green: #3ac14a;
  --green-dk: #2da03c;
  --green-lt: #e8f9eb;
  --green-mid: #b8edbf;
  --charcoal: #1a1d23;
  --text: #2c3038;
  --text2: #5a6270;
  --muted: #8a93a2;
  --info: #2563eb;
  --success: #16a34a;
  --success-lt: #f0fdf4;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 4px 10px rgba(0,0,0,0.06);
  --shadow-green: 0 4px 16px rgba(58,193,74,0.25);
  --radius: 10px; --radius-lg: 14px; --radius-xl: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  position: relative;
}

/* Subtle dot pattern */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(58,193,74,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}

/* Top green bar that fills */
.top-progress {
  position: fixed; top: 0; left: 0;
  height: 3px; width: 0%;
  background: linear-gradient(90deg, var(--green), var(--green-dk));
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(58,193,74,0.4);
  z-index: 100;
}

.load-wrap {
  position: relative; z-index: 10;
  text-align: center;
  width: 100%; max-width: 520px;
  padding: 0 24px;
}

/* Logo */
.logo {
  font-size: 28px; font-weight: 800;
  color: var(--charcoal); letter-spacing: -0.5px;
  margin-bottom: 4px;
  animation: fadeUp 0.5s ease 0.2s both;
}
.logo span { color: var(--green); }
.logo-sub {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 48px;
  animation: fadeUp 0.5s ease 0.3s both;
  display: block;
}

/* Ring loader */
.ring-wrap {
  width: 88px; height: 88px;
  margin: 0 auto 36px;
  position: relative;
  animation: fadeUp 0.5s ease 0.4s both;
}
.ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 5; }
.ring-fill {
  fill: none; stroke: var(--green); stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 245;
  stroke-dashoffset: 245;
  transition: stroke-dashoffset 0.4s ease;
  filter: drop-shadow(0 0 4px rgba(58,193,74,0.5));
}
.ring-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.ring-pct {
  font-size: 20px; font-weight: 800;
  color: var(--charcoal); line-height: 1;
  font-family: var(--mono);
}
.ring-lbl {
  font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); margin-top: 2px;
}

/* Progress bar */
.progress-wrap {
  margin-bottom: 24px;
  animation: fadeUp 0.5s ease 0.5s both;
}
.progress-track {
  height: 6px; background: var(--border);
  border-radius: 6px; overflow: hidden; margin-bottom: 10px;
}
.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--green), var(--green-dk));
  border-radius: 6px;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px rgba(58,193,74,0.3);
}
.progress-label {
  font-size: 12px; color: var(--muted); font-weight: 500;
  font-family: var(--mono);
  min-height: 18px;
}

/* Terminal log */
.terminal {
  background: var(--charcoal);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  text-align: left;
  font-family: var(--mono);
  font-size: 11.5px;
  line-height: 1.8;
  max-height: 150px;
  overflow: hidden;
  animation: fadeUp 0.5s ease 0.6s both;
  margin-bottom: 28px;
}
.log-line { animation: fadeIn 0.25s ease both; }
.log-ok   { color: var(--green); }
.log-info { color: #60a5fa; }
.log-warn { color: #fbbf24; }
.log-dim  { color: rgba(255,255,255,0.25); }

/* Welcome */
.welcome-msg {
  display: none;
  padding: 14px 20px;
  background: var(--success-lt);
  border: 1px solid var(--green-mid);
  border-radius: var(--radius-lg);
  font-size: 14px; font-weight: 700;
  color: var(--success);
  margin-bottom: 24px;
  animation: fadeUp 0.4s ease both;
}

/* Nav buttons */
.nav-buttons {
  display: none;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeUp 0.4s ease 0.1s both;
}
.nav-btn {
  padding: 12px 28px;
  border-radius: var(--radius-lg);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.18s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: none;
}
.nav-btn.primary {
  background: var(--green);
  color: var(--charcoal);
  box-shadow: var(--shadow-green);
}
.nav-btn.primary:hover { background: var(--green-dk); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(58,193,74,0.35); }
.nav-btn.secondary {
  background: var(--surface);
  color: var(--text2);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
}
.nav-btn.secondary:hover { border-color: var(--green); color: var(--green-dk); transform: translateY(-2px); }

@keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>

<div class="top-progress" id="top-progress"></div>

<div class="load-wrap">
  <div class="logo">SAPZ<span>CODES</span></div>
  <span class="logo-sub">ABAP Learning Platform — Initializing</span>

  <!-- Ring loader -->
  <div class="ring-wrap">
    <svg viewBox="0 0 88 88">
      <circle class="ring-bg" cx="44" cy="44" r="39"/>
      <circle class="ring-fill" id="ring-fill" cx="44" cy="44" r="39"/>
    </svg>
    <div class="ring-inner">
      <div class="ring-pct" id="pct">0%</div>
      <div class="ring-lbl">Loading</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="pbar"></div></div>
    <div class="progress-label" id="plabel">Authenticating session...</div>
  </div>

  <!-- Terminal log -->
  <div class="terminal" id="terminal"></div>

  <!-- Success state -->
  <div class="welcome-msg" id="welcome">✅ Access Granted — Welcome Back!</div>
  <div class="nav-buttons" id="nav-btns">
    <a class="nav-btn primary" href="executor">🖥️ ABAP Executor</a>
    <a class="nav-btn secondary" href="games">🎮 Learning Games</a>
  </div>
</div>

<script>
// Auth check
const email = sessionStorage.getItem('szc_email');
const token = sessionStorage.getItem('szc_token');
const name  = sessionStorage.getItem('szc_name') || 'Student';
if (!email || !token) window.location.href = 'index';

const steps = [
  { pct:8,   label:'Authenticating session...',           log:'[SYS]  Session token validated',                         cls:'log-ok'   },
  { pct:20,  label:'Loading SAP system catalog...',       log:'[SYS]  Connected to mock ABAP runtime v7.57',             cls:'log-info' },
  { pct:35,  label:'Initializing ABAP executor engine...',log:'[EXEC] Executor sandbox initialized',                     cls:'log-ok'   },
  { pct:48,  label:'Loading standard CDS views...',       log:'[CDS]  I_Material, I_SalesOrder, I_BusinessPartner loaded',cls:'log-ok'   },
  { pct:62,  label:'Mounting game modules...',            log:'[GAME] 6 learning modules detected',                      cls:'log-ok'   },
  { pct:74,  label:'Fetching student profile...',         log:'[PROF] Welcome back, ' + name + '!',                     cls:'log-info' },
  { pct:85,  label:'Applying personalization...',         log:'[UI]   Interface configured for ' + name,                cls:'log-ok'   },
  { pct:95,  label:'Finalizing environment...',           log:'[SYS]  All systems nominal',                             cls:'log-ok'   },
  { pct:100, label:'Ready!',                              log:'[SYS]  ✅ Platform fully loaded. Have fun!',              cls:'log-info' },
];

const pbar     = document.getElementById('pbar');
const topBar   = document.getElementById('top-progress');
const plabel   = document.getElementById('plabel');
const pctEl    = document.getElementById('pct');
const ringFill = document.getElementById('ring-fill');
const terminal = document.getElementById('terminal');
const CIRCUM   = 2 * Math.PI * 39; // ~245

let idx = 0;
function nextStep() {
  if (idx >= steps.length) {
    document.getElementById('welcome').style.display = 'block';
    document.getElementById('nav-btns').style.display = 'flex';
    return;
  }
  const s = steps[idx++];
  const p = s.pct;

  pbar.style.width    = p + '%';
  topBar.style.width  = p + '%';
  pctEl.textContent   = p + '%';
  plabel.textContent  = s.label;
  ringFill.style.strokeDashoffset = CIRCUM - (CIRCUM * p / 100);

  const line = document.createElement('div');
  line.className = 'log-line ' + s.cls;
  line.textContent = s.log;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;

  setTimeout(nextStep, idx === steps.length ? 500 : Math.random() * 500 + 350);
}

setTimeout(nextStep, 1000);
</script>
</body>
</html>
